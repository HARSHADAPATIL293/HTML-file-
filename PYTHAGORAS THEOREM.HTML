<!DOCTYPE html>
<html>
<head>
    <title>Pythagorean Theorem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .triangle {
            width: 0;
            height: 0;
            border-bottom: 200px solid #4CAF50;
            border-right: 200px solid transparent;
            position: relative;
            margin-top: 20px;
        }
        .triangle span {
            position: absolute;
            font-weight: bold;
        }
        .a { bottom: -25px; left: 80px; }
        .b { top: 80px; right: -40px; }
        .c { top: -25px; left: 70px; }
    </style>
</head>
<body>

    <h1>Pythagorean Theorem</h1>
    <p>
        The Pythagorean Theorem states that in a right-angled triangle:
        <br><br>
        <strong>a² + b² = c²</strong>
        <br><br>
        where <strong>c</strong> is the hypotenuse (the side opposite the right angle).
    </p>

    <div class="triangle">
        <span class="a">a</span>
        <span class="b">b</span>
        <span class="c">c</span>
    </div>

</body>
</html>
